name: Build EduClient Go

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: go-client

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go-client/go.mod
          cache-dependency-path: go-client/go.sum

      - name: Verify GCC
        run: gcc --version

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build Windows GUI
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          go build -trimpath -ldflags "-s -w -H=windowsgui" -o "dist/EduClient-Go-同课优先级版.exe" ./cmd/educlient

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: EduClient-Go-Windows
          path: go-client/dist/EduClient-Go-同课优先级版.exe
          if-no-files-found: error

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: go-client/dist/EduClient-Go-同课优先级版.exe
